name: Publish Snapshot
permissions:
  contents: read
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Extract Maven version
        id: extract-version
        run: |
          # 提取 <revision> 标签中的内容（版本在根项目的 pom.xml 中）
          VERSION=$(sed -n 's/<revision>\(.*\)<\/revision>/\1/p' pom.xml | head -1)
          echo "Extracted version: $VERSION"
          # 检查是否为 SNAPSHOT
          if [[ "$VERSION" == *"SNAPSHOT"* ]]; then
            echo "::set-output name=is_snapshot::true"
            echo "Detected SNAPSHOT version"
          else
            echo "::set-output name=is_snapshot::false"
            echo "Detected RELEASE version"
          fi
      - uses: actions/setup-java@v4
        if: steps.extract-version.outputs.is_snapshot == 'true'
        with:
          distribution: 'zulu'
          java-version: 8
          cache: 'maven'
          cache-dependency-path: 'pom.xml'
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-passphrase: MAVEN_GPG_PASSWORD
          gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
      - name: Publish to the Maven Central Repository
        run: chmod +x ./deploy.sh && ./deploy.sh snapshot
        env:
          MAVEN_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.OSSRH_TOKEN }}
          MAVEN_GPG_PASSWORD: ${{ secrets.MAVEN_GPG_PASSWORD }}
